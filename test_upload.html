<!DOCTYPE html>
<html>
<head>
    <title>Upload Test</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>Upload Test</h1>
    <input type="file" id="fileInput" multiple accept=".pdf,.txt">
    <button onclick="testUpload()">Upload</button>
    <div id="result"></div>

    <script>
        async function testUpload() {
            const fileInput = document.getElementById('fileInput');
            const files = fileInput.files;
            
            if (files.length === 0) {
                alert('Please select a file');
                return;
            }

            const formData = new FormData();
            
            // Add files
            for (let i = 0; i < files.length; i++) {
                formData.append('files', files[i]);
            }
            
            // Add jurisdiction
            formData.append('jurisdiction', 'India');

            try {
                console.log('Sending FormData:', formData);
                const response = await axios.post('http://127.0.0.1:8000/api/upload', formData);
                document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(response.data, null, 2) + '</pre>';
            } catch (error) {
                console.error('Error:', error.response?.data || error.message);
                document.getElementById('result').innerHTML = '<pre style="color:red">' + JSON.stringify(error.response?.data || error.message, null, 2) + '</pre>';
            }
        }
    </script>
</body>
</html>
